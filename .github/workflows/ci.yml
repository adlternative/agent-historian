name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 18: minimum supported (node:sqlite absent → OpenCode source degrades).
        # 22/24: node:sqlite present (OpenCode source active).
        node-version: ['18', '20', '22', '24']

    name: build (Node ${{ matrix.node-version }})
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Smoke test: the CLI must run on every supported Node version without
      # crashing — in particular on Node 18, where node:sqlite is unavailable
      # and the OpenCode source must degrade gracefully instead of throwing.
      # These commands exit 0 even with no agent data present (as on CI).
      - name: Smoke test (--help)
        run: node dist/cli.js --help

      - name: Smoke test (sources)
        run: |
          out="$(node dist/cli.js sources)"
          echo "$out"
          # Degradation path must be exercised: the OpenCode source is always
          # listed (available or not) — if it crashed, this line is missing.
          echo "$out" | grep -q opencode

      - name: Smoke test (sessions --global)
        run: node dist/cli.js sessions --global

  # Aggregate gate: a single stable check named "build" that branch
  # protection can require, regardless of how many Node versions the matrix
  # covers. It succeeds only if every matrix job succeeded.
  build:
    name: build
    runs-on: ubuntu-latest
    needs: build-matrix
    if: always()
    steps:
      - name: Verify matrix result
        run: |
          if [ "${{ needs.build-matrix.result }}" != "success" ]; then
            echo "build-matrix result: ${{ needs.build-matrix.result }}"
            exit 1
          fi
          echo "All matrix builds succeeded."
